# Dependabot config for contextmatrix-chat.
# Canonical copy: contextmatrix-agent/.github/dependabot.yml - sync by
# full-file copy plus repo-name swap.
# Tracks three ecosystems weekly:
#   - gomod          : Go module dependencies at the repo root.
#   - docker         : worker Dockerfile base image (+ ARG-pinned tools).
#   - github-actions : pinned action versions in .github/workflows/*.
#
# Paired with CI (.github/workflows/ci.yaml). Dependabot bump PRs must pass the
# same gates as any other PR. Minor/patch bumps are grouped to cut PR noise.

version: 2

updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - go

  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - github-actions
