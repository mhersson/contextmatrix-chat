# CI pipeline for contextmatrix-chat.
#
# Gates every pull_request on the full quality bar. Pushes to main skip the
# checks (already validated on the PR) - branch protection requires the check
# jobs to pass before merge.
#
# GitHub Actions are pinned to exact release tags; Dependabot
# (.github/dependabot.yml) keeps them current.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: go test
        run: make test

      - name: go test -race
        run: make test-race

  lint:
    name: lint
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      # Install golangci-lint at the version the Makefile pins, so CI and a
      # local `make lint` use the same release.
      - name: Install golangci-lint
        run: |
          set -euo pipefail
          VERSION=$(grep '^GOLANGCI_LINT_VERSION' Makefile | head -1 | awk '{print $NF}')
          curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/${VERSION}/install.sh" \
            | sh -s -- -b "$(go env GOPATH)/bin" "${VERSION}"

      - name: golangci-lint
        run: make lint

  build:
    name: build
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: make build

  govulncheck:
    name: govulncheck
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Fail only on findings that have an upstream fix (fixed_version set);
      # transitive findings with no available fix are printed but do not block.
      - name: Run govulncheck (fail only on fixable findings)
        run: |
          set -euo pipefail
          govulncheck -format=json ./... > /tmp/vuln.json 2>&1 || true

          FIXABLE=$(jq -s '[.[] | select(.finding != null
                                          and .finding.fixed_version != null
                                          and .finding.fixed_version != "")] | length' /tmp/vuln.json)

          echo "fixable findings: ${FIXABLE}"

          govulncheck ./... || true

          if [ "${FIXABLE:-0}" -gt 0 ]; then
            echo "::error::Fixable vulnerabilities detected. See output above."
            exit 1
          fi

          echo "No fixable vulnerabilities. Remaining findings have no upstream fix available."

  hadolint:
    name: hadolint
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: docker/Dockerfile.worker

  worker-image-scan:
    name: worker-image-scan
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Build worker image
        run: make docker-worker

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: contextmatrix-chat-worker:dev
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          # Only run the vulnerability scanner. The default secret scanner
          # flags gosec regex literals (shipped with golangci-lint) as
          # hardcoded credentials - false positives.
          scanners: vuln
          trivyignores: .trivyignore
